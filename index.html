<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Smart Contractor By Ahmed Mohamed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="h-full text-gray-800">

    <div id="activation-screen" class="hidden fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-red-600 mb-2">تنشيط النظام | System Activation</h2>
            <p class="text-sm text-gray-600 mb-4">The Smart Contractor By Ahmed Mohamed</p>
            <hr class="mb-4">
            <p class="text-sm font-semibold mb-2">كود بصمة الجهاز الخاص بك (انسخه وأرسله للمطور):</p>
            <div id="device-id-box" class="bg-gray-100 p-3 rounded-lg font-mono text-xs select-all border border-gray-300 mb-4 break-all"></div>
            <input type="text" id="license-key-input" placeholder="أدخل كود التفعيل هنا | Enter License Key" class="w-full p-3 border border-gray-300 rounded-lg text-center mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="activate-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">تفعيل الأداة الآن</button>
        </div>
    </div>

    <div id="setup-screen" class="hidden fixed inset-0 bg-blue-900 bg-opacity-40 backdrop-blur-sm z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 id="setup-title" class="text-2xl font-bold text-blue-900 mb-4 text-center"></h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1" id="lbl-comp-name"></label>
                    <input type="text" id="setup-company-name" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1" id="lbl-comp-phone"></label>
                    <input type="text" id="setup-company-phone" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1" id="lbl-comp-address"></label>
                    <input type="text" id="setup-company-address" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1" id="lbl-comp-logo"></label>
                    <input type="file" id="setup-company-logo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <button id="save-setup-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-4"></button>
            </div>
        </div>
    </div>

    <!-- تم زيادة الحشو السفلي هنا pb-32 لضمان ظهور العناصر فوق الفوتر تماماً -->
    <div class="max-w-4xl mx-auto p-4 pb-32">
        
        <header class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-100">
            <div>
                <h1 id="app-main-title" class="text-xl font-bold text-blue-900"></h1>
                <p class="text-xs text-gray-400">By Ahmed Mohamed</p>
            </div>
            <div class="flex gap-2">
                <button id="lang-toggle-btn" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 text-sm rounded-lg font-bold transition"></button>
                <button id="settings-btn" class="bg-gray-100 hover:bg-gray-200 p-2 rounded-lg text-sm transition">⚙️</button>
            </div>
        </header>

        <section class="bg-white p-5 rounded-xl shadow-sm mb-6 border border-gray-100 space-y-4">
            <h3 id="sec-client-info" class="font-bold text-lg text-gray-700 mb-2 border-b pb-2"></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label id="lbl-customer-name" class="block text-xs font-semibold mb-1 text-gray-500"></label>
                    <input type="text" id="client-name" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label id="lbl-customer-phone" class="block text-xs font-semibold mb-1 text-gray-500"></label>
                    <input type="text" id="client-phone" class="w-full p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 pt-2 border-t">
                <div>
                    <label id="lbl-markup" class="block text-[10px] md:text-xs font-semibold mb-1 text-gray-500"></label>
                    <input type="number" id="markup-rate" value="15" class="w-full p-2 border rounded-lg text-center font-bold">
                </div>
                <div>
                    <label id="lbl-contingency" class="block text-[10px] md:text-xs font-semibold mb-1 text-gray-500"></label>
                    <input type="number" id="contingency-rate" value="5" class="w-full p-2 border rounded-lg text-center font-bold">
                </div>
                <div>
                    <label id="lbl-waste" class="block text-[10px] md:text-xs font-semibold mb-1 text-gray-500"></label>
                    <input type="number" id="waste-rate" value="5" class="w-full p-2 border rounded-lg text-center font-bold">
                </div>
            </div>
        </section>

        <section class="space-y-4" id="items-container">
            <h3 id="sec-items" class="font-bold text-lg text-gray-700 mb-2"></h3>
            <div id="dynamic-items-list" class="space-y-3"></div>
        </section>

        <!-- تم ضبط الفوتر ليكون متوافقاً ومستقراً أسفل جميع الشاشات بدون تغطية البنود الأخيرة -->
        <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-xl flex gap-4 max-w-4xl mx-auto z-30 mb-[env(safe-area-inset-bottom)]">
            <button id="add-new-item-btn" class="bg-gray-800 text-white font-semibold px-4 py-3 rounded-xl hover:bg-gray-900 transition flex items-center justify-center gap-1 shrink-0">
                <span>➕</span> <span id="btn-text-add"></span>
            </button>
            <button id="generate-pdf-btn" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-md shadow-green-100">
                <span>📄</span> <span id="btn-text-pdf"></span>
            </button>
        </footer>

    </div>

    <div id="add-item-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full">
            <h3 id="modal-add-title" class="font-bold text-lg mb-4 text-gray-800"></h3>
            <div class="space-y-3">
                <div>
                    <label id="lbl-new-name" class="block text-xs font-semibold text-gray-500 mb-1"></label>
                    <input type="text" id="new-item-name" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label id="lbl-new-mat" class="block text-xs font-semibold text-gray-500 mb-1"></label>
                    <input type="number" id="new-item-mat-cost" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label id="lbl-new-lab" class="block text-xs font-semibold text-gray-500 mb-1"></label>
                    <input type="number" id="new-item-lab-cost" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button id="close-modal-btn" class="flex-1 bg-gray-200 text-gray-700 font-semibold py-2 rounded-lg">إلغاء</button>
                    <button id="save-new-item-btn" class="flex-1 bg-blue-600 text-white font-semibold py-2 rounded-lg">حفظ البند</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./sw.js");
        }
    </script>
</body>
</html>

        </div>
    </div>

    <script src="app.js"></script>

        if ("serviceWorker" in navigator) {

</body>
</html>
